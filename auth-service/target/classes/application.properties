# ============================================
# Auth Service - Modulo A - SisExt-SI
# ============================================

server.port=8081
spring.application.name=auth-service

# --- Banco de dados H2 em arquivo (persiste entre execucoes) ---
spring.datasource.url=jdbc:h2:file:./data/authdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Serializa datas como texto ISO-8601 (e nao como timestamp numerico),
# facilitando a leitura do JSON pelos servicos B e C.
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Configuracao da sessao/token (Modulo A) ---
# Tempo de validade do token emitido no login, em minutos.
auth.token.duracao-minutos=120

# --- Documentacao da API (Swagger) ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
