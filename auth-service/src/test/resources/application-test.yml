spring:
  datasource:
    url: jdbc:h2:mem:authservice;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

auth:
  jwt:
    secret: test-secret-change-me-with-at-least-32-chars
    expiration-minutes: 120

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: WARN
